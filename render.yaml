# Render Blueprint - Vista Web Application
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vista-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      cd packages/vista && NODE_ENV=development npm install --legacy-peer-deps && cd ../../apps/web && rm -f package-lock.json && NODE_ENV=development npm install --legacy-peer-deps && npx tsx ../../packages/vista/bin/vista.js build
    startCommand: cd apps/web && npx tsx ../../packages/vista/bin/vista.js start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
    healthCheckPath: /
