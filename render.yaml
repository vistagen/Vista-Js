# Render Blueprint - Vista Web Application
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vista-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm --prefix packages/vista install --no-package-lock --include=dev --no-audit --no-fund
      npm --prefix apps/web install --no-package-lock --include=dev --no-audit --no-fund
      npm --prefix apps/web run build
    startCommand: npm --prefix apps/web run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
    healthCheckPath: /
